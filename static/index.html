<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riverwood AI Voice Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2940 50%, #0d2137 100%);
            color: #e0e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            padding: 30px 20px 10px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .header h1 span {
            color: #4ecdc4;
        }

        .header p {
            color: #8899aa;
            font-size: 14px;
            margin-top: 4px;
        }

        /* Setup Screen */
        .setup-screen {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 32px;
            margin: 20px;
            max-width: 420px;
            width: 90%;
            backdrop-filter: blur(10px);
        }

        .setup-screen h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #4ecdc4;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #8899aa;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #4ecdc4;
        }

        .form-group select option { background: #1a2940; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4ecdc4, #44b09e);
            color: #0a1628;
        }

        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(78,205,196,0.3); }

        .btn-danger {
            background: rgba(255,82,82,0.2);
            color: #ff5252;
            border: 1px solid rgba(255,82,82,0.3);
        }

        .btn-danger:hover { background: rgba(255,82,82,0.3); }

        /* Call Screen */
        .call-screen {
            display: none;
            width: 90%;
            max-width: 500px;
            margin: 20px;
            flex: 1;
            flex-direction: column;
        }

        .call-screen.active { display: flex; }
        .setup-screen.hidden { display: none; }

        .call-status {
            text-align: center;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background: #4ecdc4;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }

        .call-status span {
            font-size: 14px;
            color: #4ecdc4;
            font-weight: 500;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 300px;
            max-height: 50vh;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.agent {
            background: rgba(78,205,196,0.12);
            border: 1px solid rgba(78,205,196,0.2);
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }

        .message.user {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }

        .message .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .message.agent .label { color: #4ecdc4; }
        .message.user .label { color: #8899aa; }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 12px 16px;
            background: rgba(78,205,196,0.08);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator.active { display: flex; gap: 4px; }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #4ecdc4;
            border-radius: 50%;
            animation: typing 1.2s ease-in-out infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-4px); }
        }

        /* Input Area */
        .input-area {
            padding: 16px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 14px 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        .input-area input:focus { border-color: #4ecdc4; }

        .icon-btn {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .mic-btn {
            background: rgba(78,205,196,0.15);
            border: 2px solid rgba(78,205,196,0.3);
        }

        .mic-btn:hover { background: rgba(78,205,196,0.25); }
        .mic-btn.recording {
            background: rgba(255,82,82,0.2);
            border-color: #ff5252;
            animation: pulse 1s infinite;
        }

        .send-btn {
            background: linear-gradient(135deg, #4ecdc4, #44b09e);
        }

        .send-btn:hover { transform: scale(1.05); }

        .mic-btn svg, .send-btn svg {
            width: 20px;
            height: 20px;
        }

        .mic-btn svg { fill: #4ecdc4; }
        .mic-btn.recording svg { fill: #ff5252; }
        .send-btn svg { fill: #0a1628; }

        .controls {
            padding: 12px 16px;
            display: flex;
            gap: 10px;
        }

        .controls .btn { flex: 1; padding: 10px; font-size: 14px; }

        .speaker-toggle {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #8899aa;
        }

        .speaker-toggle.active {
            background: rgba(78,205,196,0.15);
            border-color: rgba(78,205,196,0.3);
            color: #4ecdc4;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 12px;
            font-size: 12px;
            color: #556677;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .header h1 { font-size: 22px; }
            .chat-container { max-height: 40vh; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1><span>RIVERWOOD</span> AI Voice Agent</h1>
    <p>AI-Powered Customer Communication System</p>
</div>

<!-- Setup Screen -->
<div class="setup-screen" id="setupScreen">
    <h2>Start a Call</h2>
    <div class="form-group">
        <label>Customer Name</label>
        <input type="text" id="customerName" placeholder="e.g. Rajesh Kumar" value="Rajesh Kumar">
    </div>
    <div class="form-group">
        <label>Language Preference</label>
        <select id="language">
            <option value="english">English</option>
            <option value="hindi">Hindi (Romanized)</option>
        </select>
    </div>
    <button class="btn btn-primary" onclick="startCall()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24 11.36 11.36 0 003.58.57 1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1 11.36 11.36 0 00.57 3.58 1 1 0 01-.25 1.01l-2.2 2.2z"/></svg>
        Simulate Outbound Call
    </button>
</div>

<!-- Call Screen -->
<div class="call-screen" id="callScreen">
    <div class="call-status">
        <div class="pulse-dot"></div>
        <span id="callStatusText">Call Connected</span>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="typing-indicator" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your response or use mic..."
               onkeydown="if(event.key==='Enter')sendMessage()">
        <button class="icon-btn mic-btn" id="micBtn" onclick="toggleMic()">
            <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm-1-9a1 1 0 012 0v6a1 1 0 01-2 0V5zm6 6a5 5 0 01-10 0H5a7 7 0 0014 0h-2zm-5 9a1 1 0 01-1-1v-1.08A7 7 0 015 11H3a9 9 0 0018 0h-2a7 7 0 01-7 7v1.08a1 1 0 01-1 1z"/></svg>
        </button>
        <button class="icon-btn send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <div class="controls">
        <button class="btn speaker-toggle active" id="speakerBtn" onclick="toggleSpeaker()">
            Speaker: ON
        </button>
        <button class="btn btn-danger" onclick="endCall()">End Call</button>
    </div>
</div>

<div class="footer">
    Riverwood Projects LLP &mdash; Building Foundations, Creating Relationships
</div>

<script>
let sessionId = null;
let speakerOn = true;
let recognition = null;
let isRecording = false;
let currentUtterance = null;

// Speech Recognition Setup
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        document.getElementById('userInput').value = transcript;
        sendMessage();
    };

    recognition.onend = () => {
        isRecording = false;
        document.getElementById('micBtn').classList.remove('recording');
    };

    recognition.onerror = () => {
        isRecording = false;
        document.getElementById('micBtn').classList.remove('recording');
    };
}

function toggleMic() {
    if (!recognition) {
        alert('Speech recognition is not supported in this browser. Please use Chrome.');
        return;
    }

    const lang = document.getElementById('language').value;

    if (isRecording) {
        recognition.stop();
        isRecording = false;
        document.getElementById('micBtn').classList.remove('recording');
    } else {
        // Stop any ongoing speech so it doesn't interfere
        window.speechSynthesis.cancel();
        recognition.lang = lang === 'hindi' ? 'hi-IN' : 'en-US';
        recognition.start();
        isRecording = true;
        document.getElementById('micBtn').classList.add('recording');
    }
}

function speak(text) {
    if (!speakerOn) return;

    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    const lang = document.getElementById('language').value;
    utterance.lang = lang === 'hindi' ? 'hi-IN' : 'en-US';
    utterance.rate = 1.0;
    utterance.pitch = 1.0;

    // Try to pick a good voice
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v =>
        lang === 'hindi'
            ? v.lang.startsWith('hi')
            : (v.name.includes('Google') && v.lang.startsWith('en'))
    );
    if (preferred) utterance.voice = preferred;

    currentUtterance = utterance;
    window.speechSynthesis.speak(utterance);
}

function toggleSpeaker() {
    speakerOn = !speakerOn;
    const btn = document.getElementById('speakerBtn');
    btn.textContent = `Speaker: ${speakerOn ? 'ON' : 'OFF'}`;
    btn.classList.toggle('active', speakerOn);
    if (!speakerOn) window.speechSynthesis.cancel();
}

function addMessage(text, role) {
    const container = document.getElementById('chatContainer');
    const indicator = document.getElementById('typingIndicator');

    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `<div class="label">${role === 'agent' ? 'Riverwood AI' : 'You'}</div>${text}`;

    container.insertBefore(div, indicator);
    container.scrollTop = container.scrollHeight;
}

function showTyping(show) {
    document.getElementById('typingIndicator').classList.toggle('active', show);
    const container = document.getElementById('chatContainer');
    container.scrollTop = container.scrollHeight;
}

async function startCall() {
    const name = document.getElementById('customerName').value.trim() || 'Customer';
    const lang = document.getElementById('language').value;

    document.getElementById('setupScreen').classList.add('hidden');
    document.getElementById('callScreen').classList.add('active');
    document.getElementById('callStatusText').textContent = `Calling ${name}...`;

    showTyping(true);

    try {
        const res = await fetch('/api/start-call', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ customer_name: name, language: lang })
        });
        const data = await res.json();
        sessionId = data.session_id;

        showTyping(false);
        document.getElementById('callStatusText').textContent = `Connected with ${name}`;
        addMessage(data.response, 'agent');
        speak(data.response);
    } catch (err) {
        showTyping(false);
        addMessage('Sorry, could not connect. Please check if the server is running and your API key is set.', 'agent');
    }
}

async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    addMessage(text, 'user');
    showTyping(true);

    // Stop any ongoing speech
    window.speechSynthesis.cancel();

    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                message: text,
                session_id: sessionId,
                customer_name: document.getElementById('customerName').value.trim()
            })
        });
        const data = await res.json();

        showTyping(false);
        addMessage(data.response, 'agent');
        speak(data.response);
    } catch (err) {
        showTyping(false);
        addMessage('Sorry, I encountered an error. Please try again.', 'agent');
    }
}

function endCall() {
    window.speechSynthesis.cancel();
    if (isRecording && recognition) recognition.stop();

    addMessage('Call ended. Thank you for choosing Riverwood Projects!', 'agent');
    document.getElementById('callStatusText').textContent = 'Call Ended';
    document.querySelector('.pulse-dot').style.background = '#ff5252';
    document.querySelector('.pulse-dot').style.animation = 'none';

    setTimeout(() => {
        document.getElementById('callScreen').classList.remove('active');
        document.getElementById('setupScreen').classList.remove('hidden');
        document.getElementById('chatContainer').innerHTML =
            '<div class="typing-indicator" id="typingIndicator"><span></span><span></span><span></span></div>';
        document.querySelector('.pulse-dot').style.background = '#4ecdc4';
        document.querySelector('.pulse-dot').style.animation = '';
        sessionId = null;
    }, 2000);
}

// Load voices
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>

</body>
</html>
